services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "8081:8080"   # Map frontend container’s 8080 to host 8081
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
